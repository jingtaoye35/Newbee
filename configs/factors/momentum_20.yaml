# 20 日动量因子配置
#
# 由 factors/pipeline.py / engines/backtest_alpha.py 加载使用
# 与 alpha_backend.factors.classic.momentum.momentum_20 因子函数对应
factor:
  name: momentum_20
  version: "1.0"
  type: classic  # classic | custom

# 计算参数
compute:
  window: 20                  # 回看窗口 (交易日)
  field: adj_close            # 输入字段 (前复权收盘价)
  handle_invalid: nan         # 数据不足 / 价格异常 → NaN

# 数据依赖
datas:
  source: sina                # sina | em | tx
  adjust: qfq                 # qfq (前复权) | hfq | ''
  start: "2020-01-01"
  end: "2024-12-31"

# 评价 (回测用)
evaluation:
  min_valid: 30               # 最少有效样本数, 否则该期 IC 记 NaN
  n_groups: 10                # decile 分组数

# 缓存
cache:
  enabled: true
  version: "1.0"
  notes: "20 日动量: close(t) / close(t-20) - 1"